<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issues Tacker</title>
    <link
      rel="shortcut icon"
      href="assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- daisyUI & Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font-awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header class="bg-base-200 shadow-sm">
      <div
        class="flex flex-col sm:flex-row sm:justify-between sm:items-center px-4 sm:px-6 py-4 gap-3"
      >
        <div class="flex items-center gap-3">
          <img
            class="w-[40px]"
            src="assets/github-logo.png"
            alt="GitHub Logo"
          />
          <h2 class="text-xl font-semibold">GitHub Issues Tracker</h2>
        </div>
        <div
          class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full sm:w-auto"
        >
          <label class="input flex-1">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input
              id="search-input"
              type="search"
              placeholder="Search issues..."
              class="w-full sm:w-64"
            />
          </label>
          <button class="btn btn-active btn-primary whitespace-nowrap">
            <i class="fa-solid fa-plus"></i> New Issue
          </button>
        </div>
      </div>
    </header>
    <main class="w-10/12 mx-auto">
      <div
        class="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-gray-100 mt-5 p-4 gap-3 rounded-lg"
      >
        <div class="flex flex-wrap gap-2">
          <button class="btn btn-primary">All</button>
          <button class="btn">Open</button>
          <button class="btn">Closed</button>
        </div>

        <div></div>
      </div>
      <!-- 2nd div -->
      <div
        class="flex justify-between items-center mt-5 bg-gray-100 p-4 rounded-lg"
      >
        <div class="flex gap-2">
          <div
            class="bg-[#ECE4FF] p-2 rounded-full flex items-center justify-center"
          >
            <img class="w-[27px]" src="assets/Aperture.png" alt="" />
          </div>
          <div>
            <h3 class="font-semibold text-[20px]">
              <span id="total-issue"></span> Issues
            </h3>
            <p class="text-[20px] text-[#64748B]">
              Track and manage your project issues
            </p>
          </div>
        </div>
        <div
          class="flex flex-col sm:flex-row gap-2 sm:gap-4 text-[16px] font-medium"
        >
          <p class="flex items-center gap-2">
            <img src="assets/Ellipse 2.png" alt="Open" class="w-4 h-4" />
            Open
          </p>

          <p class="flex items-center gap-2">
            <img src="assets/Ellipse 2 (1).png" alt="Closed" class="w-4 h-4" />
            Closed
          </p>
        </div>
      </div>
      <!-- loading spinner -->
      <div id="loadingSpinner" class="hidden flex justify-center items-center">
        <span class="loading loading-dots loading-xl"></span>
      </div>
      <!-- card section -->
      <section
        id="card-container"
        class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mt-5 bg-gray-100 p-3 rounded-xl"
      >
        <!-- card -->
      </section>

      <!-- modal -->

      <!-- Open the modal using ID.showModal() method -->
      <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
      <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
          <div id="issue-container"></div>

          <div class="modal-action">
            <form method="dialog">
              <button class="btn btn-primary">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </main>

    <script src="script/home.js"></script>
  </body>
</html>
